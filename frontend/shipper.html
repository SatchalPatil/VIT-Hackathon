<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Plain Cream White Background */
        body {
            background-color: #FAF9F6;
        }
    </style>
    <title>CargoScan AI - Shipper Profiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-transparent text-slate-900 min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-56 bg-white shadow-sm border border-slate-200/60 min-h-screen p-4 flex flex-col fixed">
            <div class="mb-8">
                <h1 class="text-xl font-bold text-slate-800">CargoScan AI</h1>
                <p class="text-xs text-slate-500 mt-1">Customs X-Ray Analysis</p>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="index.html" class="flex items-center px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 border border-slate-200 hover:text-slate-800">
                    <span class="mr-3">📡</span> Scan
                </a>
                <a href="compare.html" class="flex items-center px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 border border-slate-200 hover:text-slate-800">
                    <span class="mr-3">🔄</span> Compare
                </a>
                <a href="audit.html" class="flex items-center px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 border border-slate-200 hover:text-slate-800">
                    <span class="mr-3">📋</span> Audit Trail
                </a>
                <a href="shipper.html" class="flex items-center px-3 py-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-800">
                    <span class="mr-3">🚢</span> Shippers
                </a>
                <a href="feedback.html" class="flex items-center px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 border border-slate-200 hover:text-slate-800">
                    <span class="mr-3">📊</span> Feedback
                </a>
                <a href="report.html" class="flex items-center px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 border border-slate-200 hover:text-slate-800">
                    <span class="mr-3">📄</span> Reports
                </a>
            </nav>
            <div class="pt-4 border-t border-slate-200">
                <p class="text-xs text-slate-400 text-center">Powered by Gemini 2.5 Flash</p>
                <p class="text-xs text-slate-400 text-center mt-1">For official use only</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-56 p-6">
            <h2 class="text-2xl font-bold mb-6">Shipper Risk Profiles</h2>

            <!-- Filters -->
            <div class="flex items-center gap-4 mb-6">
                <input type="text" id="searchInput" class="bg-slate-50 border border-slate-200 border border-slate-300 rounded-lg px-3 py-2 text-slate-800 placeholdtext-slate-700" placeholder="Search shippers...">
                <select id="sortSelect" class="bg-slate-50 border border-slate-200 border border-slate-300 rounded-lg px-3 py-2 text-slate-800">
                    <option value="risk">Sort by Risk Score</option>
                    <option value="scans">Sort by Scan Count</option>
                    <option value="lastSeen">Sort by Last Seen</option>
                </select>
                <div class="flex gap-2">
                    <button class="filter-btn px-3 py-1 rounded-lg text-sm bg-slate-50 border border-slate-200 text-slate-800" data-filter="all">All</button>
                    <button class="filter-btn px-3 py-1 rounded-lg text-sm bg-slate-100 text-slate-600" data-filter="high">High Risk</button>
                    <button class="filter-btn px-3 py-1 rounded-lg text-sm bg-slate-100 text-slate-600" data-filter="watchlist">Watchlist</button>
                </div>
            </div>

            <!-- Shipper Cards Grid -->
            <div id="shipperGrid" class="grid grid-cols-2 gap-4"></div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-12">
                <div class="text-4xl mb-3">🚢</div>
                <p class="text-slate-600">No shipper profiles yet</p>
                <p class="text-slate-400 text-sm">Profiles are created automatically when scans are processed</p>
            </div>
        </main>
    </div>

    <script src="js/shipper.js"></script>
    <script>
        let currentFilter = 'all';
        let currentSort = 'risk';

        function getRelativeTime(timestamp) {
            const now = new Date();
            const then = new Date(timestamp);
            const diff = Math.floor((now - then) / 1000);

            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return Math.floor(diff / 86400) + 'd ago';
        }

        function getDaysSince(timestamp) {
            const now = new Date();
            const then = new Date(timestamp);
            return Math.floor((now - then) / (1000 * 60 * 60 * 24));
        }

        function renderShippers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let shippers = Shipper.getShipperList(currentSort, currentFilter);

            if (search) {
                shippers = shippers.filter(s => s.name.toLowerCase().includes(search));
            }

            const grid = document.getElementById('shipperGrid');
            const emptyState = document.getElementById('emptyState');

            if (shippers.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.innerHTML = '';

            shippers.forEach(shipper => {
                const tier = Shipper.getRiskTier(shipper.compositeRisk);
                const flagRate = shipper.totalScans > 0 ? Math.round((shipper.flagged / shipper.totalScans) * 100) : 0;
                const flagRateColor = flagRate > 50 ? '#ef4444' : flagRate > 25 ? '#f59e0b' : '#22c55e';

                const card = document.createElement('div');
                card.className = 'bg-white shadow-sm border border-slate-200/60 rounded-xl p-4';

                // Generate sparkline
                const sparklinePath = Shipper.generateSparklinePath(shipper.riskHistory, 200, 32);

                card.innerHTML = `
                    ${shipper.compositeRisk >= 70 ? `
                        <div class="bg-red-900/50 border border-red-800 rounded-lg px-3 py-2 mb-3 text-sm text-red-400">
                            ⚠ On high-risk watchlist — all shipments require supervisor approval before clearance
                        </div>
                    ` : ''}
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="text-lg font-semibold">${shipper.name}</h3>
                            <p class="text-xs text-slate-500">First seen ${getDaysSince(shipper.firstSeen)} days ago · Last scan ${getRelativeTime(shipper.lastSeen)}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-bold" style="color: ${tier.color}">${shipper.compositeRisk}</div>
                            <div class="text-xs" style="color: ${tier.color}">${tier.label}</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2 mb-3">
                        <div class="bg-slate-50 border border-slate-200 rounded-lg p-2 text-center">
                            <p class="text-slate-500 text-xs">Scans</p>
                            <p class="font-bold">${shipper.totalScans}</p>
                        </div>
                        <div class="bg-slate-50 border border-slate-200 rounded-lg p-2 text-center">
                            <p class="text-slate-500 text-xs">Flagged</p>
                            <p class="font-bold text-red-400">${shipper.flagged}</p>
                        </div>
                        <div class="bg-slate-50 border border-slate-200 rounded-lg p-2 text-center">
                            <p class="text-slate-500 text-xs">Cleared</p>
                            <p class="font-bold text-green-400">${shipper.cleared}</p>
                        </div>
                        <div class="bg-slate-50 border border-slate-200 rounded-lg p-2 text-center">
                            <p class="text-slate-500 text-xs">Flag Rate</p>
                            <p class="font-bold" style="color: ${flagRateColor}">${flagRate}%</p>
                        </div>
                    </div>

                    <div class="mb-3">
                        <p class="text-xs text-slate-500 mb-1">Risk Trend (Last 10 scans)</p>
                        <svg width="100%" height="32" viewBox="0 0 200 32" class="bg-slate-50 border border-slate-200 rounded">
                            ${sparklinePath ? `
                                <path d="${sparklinePath}" fill="none" stroke="${tier.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                ${shipper.riskHistory.map((val, i) => {
                                    const x = 4 + (i / (shipper.riskHistory.length - 1 || 1)) * 192;
                                    const y = 4 + 24 - (val / 100) * 24;
                                    return `<circle cx="${x}" cy="${y}" r="3" fill="${tier.color}"/>`;
                                }).join('')}
                            ` : '<text x="100" y="20" text-anchor="middle" fill="#6b7280" font-size="10">No history</text>'}
                        </svg>
                    </div>

                    <div class="flex flex-wrap gap-1 mb-3">
                        ${(shipper.routes || []).map(r => `<span class="px-2 py-0.5 bg-slate-50 border border-slate-200 rounded text-xs text-slate-600">${r}</span>`).join('')}
                    </div>

                    <a href="audit.html?search=${encodeURIComponent(shipper.name)}" class="block text-center bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-800 py-2 rounded-lg text-sm">
                        View History →
                    </a>
                `;

                grid.appendChild(card);
            });
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', renderShippers);

        document.getElementById('sortSelect').addEventListener('change', e => {
            currentSort = e.target.value;
            renderShippers();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-slate-50 border border-slate-200', 'text-slate-800');
                    b.classList.add('bg-slate-100', 'text-slate-600');
                });
                btn.classList.remove('bg-slate-100', 'text-slate-600');
                btn.classList.add('bg-slate-50 border border-slate-200', 'text-slate-800');

                currentFilter = btn.dataset.filter;
                renderShippers();
            });
        });

        // Initial render
        renderShippers();
    </script>
</body>
</html>
